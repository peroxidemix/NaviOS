<!DOCTYPE html>
<html><head><style>
html, body { margin:0; padding:0; background:transparent; overflow:hidden; width:100%; height:100%; display:flex; align-items:flex-start; justify-content:flex-end; }
@keyframes bobSubtle {
  0%, 100% { translate: 0 0; }
  50% { translate: 0 -3px; }
}
.node {
  animation-name: glow, bobSubtle;
  animation-duration: 2.4s, 5s;
  animation-timing-function: ease-in-out, ease-in-out;
  animation-iteration-count: infinite, infinite;

  position: relative;
  width: 160px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  animation: glow 2.4s ease-in-out infinite;
  transition: filter 0.3s ease;
}
.node.active {
  filter: drop-shadow(0 0 26px rgba(120,170,255,1)) !important;
}
@keyframes glow {
  0%, 100% { filter: drop-shadow(0 0 10px rgba(90,140,230,0.7)); }
  50% { filter: drop-shadow(0 0 28px rgba(90,140,230,1)); }
}
.node canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
#clock {
  position: relative; z-index: 1;
  font-family: 'Love Letter Typewriter', monospace;
  color: #eaf0ff;
  text-align: center;
  text-shadow: 1px 1px 0 #1c2454, 2px 2px 0 #141a3a;
}
#clock .time { font-size: 17px; letter-spacing: 1px; }
#clock .date { font-size: 10px; opacity: 0.8; margin-top: 1px; }
</style></head>
<body>
  <div class="node">
    <canvas class="pillcanvas" width="160" height="80"></canvas>
    <div id="clock"><div class="time" id="clock-time">00:00:00</div><div class="date" id="clock-date">--- -- ----</div></div>
  </div>
<script>
document.querySelectorAll('.pillcanvas').forEach(c => {
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height, cx = w/2, cy = h/2, rx = w/2, ry = h/2;
  const grad = ctx.createRadialGradient(cx-rx*0.3, cy-ry*0.35, 2, cx, cy, rx*0.92);
  grad.addColorStop(0, '#9fb6f2'); grad.addColorStop(0.45, '#6f86d6'); grad.addColorStop(1, '#3a4ea0');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(cx, cy, rx*0.85, ry*0.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'overlay';
  function shineDot(sx, sy, size, alpha) {
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, size);
    g.addColorStop(0, 'rgba(255,255,255,' + alpha + ')');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI*2); ctx.fill();
  }
  shineDot(cx - rx*0.4, cy - ry*0.45, 8, 0.5);
  shineDot(cx + rx*0.5, cy - ry*0.2, 7, 0.4);
  shineDot(cx - rx*0.1, cy + ry*0.5, 7, 0.35);
  ctx.globalCompositeOperation = 'source-over';
});

const clockTimeEl = document.getElementById('clock-time');
const clockDateEl = document.getElementById('clock-date');
const CLOCK_SCRAMBLE = '0123456789';
function pad(n) { return n.toString().padStart(2, '0'); }
function updateClock() {
  const now = new Date();
  let hr = now.getHours();
  const ampm = hr >= 12 ? 'PM' : 'AM';
  hr = hr % 12;
  if (hr === 0) hr = 12;
  const h = pad(hr);
  const m = pad(now.getMinutes());
  const s = pad(now.getSeconds());
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  clockDateEl.textContent = `${days[now.getDay()]} ${months[now.getMonth()]} ${pad(now.getDate())} ${now.getFullYear()}`;
  let ticks = 0;
  const iv = setInterval(() => {
    ticks++;
    const r1 = CLOCK_SCRAMBLE[Math.floor(Math.random()*10)];
    const r2 = CLOCK_SCRAMBLE[Math.floor(Math.random()*10)];
    clockTimeEl.textContent = `${h}:${m}:${r1}${r2} ${ampm}`;
    if (ticks > 3) {
      clearInterval(iv);
      clockTimeEl.textContent = `${h}:${m}:${s} ${ampm}`;
    }
  }, 40);
}
updateClock();
setInterval(updateClock, 1000);

window.setNetActive = (active) => {
  const node = document.querySelector('.node');
  node.classList.toggle('active', active);
};
</script>
</body></html>
